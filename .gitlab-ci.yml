workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - test

variables:
  NODE_VERSION: "22"

.node_base:
  image: node:${NODE_VERSION}
  before_script:
    - npm ci

lint:
  extends: .node_base
  stage: test
  script:
    - npm run lint

test:
  extends: .node_base
  stage: test
  parallel:
    matrix:
      - NODE_VERSION: ["20", "22"]
  script:
    - npm test
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    when: always
    expire_in: 7 days
