name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions: {}

jobs:
  cla:
    if: github.event_name == 'pull_request_target' || (github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.issue.state == 'open')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/Fmarzochi/EGC/blob/main/.github/CLA.md
          branch: cla-signatures
          allowlist: Fmarzochi,Kunall7890,dependabot[bot],github-actions[bot],renovate[bot],coderabbitai[bot],sonarqubecloud[bot],cubic-dev-ai[bot]
          create-file-commit-message: "chore(cla): initialize signatures file"
          signed-commit-message: "chore(cla): add @$contributorName signature"
          custom-notsigned-prcomment: |
            Thank you for your contribution to EGC!

            Please sign our Contributor License Agreement to get this PR merged.

            Read [.github/CLA.md](https://github.com/Fmarzochi/EGC/blob/main/.github/CLA.md), then post the comment below:

            > I have read the CLA Document and I hereby sign the CLA.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA."
          custom-allsigned-prcomment: "All contributors have signed the CLA. Thank you!"
          lock-pullrequest-aftermerge: false
